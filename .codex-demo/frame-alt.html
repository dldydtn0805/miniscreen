<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roadmap</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff7ed;
        color: #7c2d12;
      }

      .wrap {
        padding: 24px 18px 40px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
        line-height: 1.05;
      }

      .lead {
        margin: 0 0 18px;
        color: #9a3412;
        font-size: 14px;
        line-height: 1.6;
      }

      .step {
        margin-bottom: 12px;
        padding: 14px;
        border: 1px solid rgba(154, 52, 18, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.84);
      }

      .step strong {
        display: block;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Roadmap Snapshot</h1>
      <p class="lead">A second frame can be used for plans, specs, dashboards, or quick references.</p>
      <div class="step">
        <strong>Q2</strong>
        Persist size and position across sessions.
      </div>
      <div class="step">
        <strong>Q3</strong>
        Add bookmark grouping and search.
      </div>
      <div class="step">
        <strong>Q4</strong>
        Introduce keyboard shortcuts and a settings surface.
      </div>
    </div>
    <script src="/frame-tracker.js"></script>
  </body>
</html>
