<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Notes</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      .hero {
        padding: 24px 20px 18px;
        color: white;
        background:
          radial-gradient(circle at top right, rgba(255, 255, 255, 0.3), transparent 30%),
          linear-gradient(135deg, #0f766e 0%, #2563eb 100%);
      }

      .hero span {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 12px 0 8px;
        font-size: 28px;
        line-height: 1.05;
      }

      .hero p {
        margin: 0;
        font-size: 14px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.84);
      }

      .section {
        padding: 18px 20px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        padding: 14px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 18px;
        background: white;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
      }

      .metric strong {
        display: block;
        font-size: 22px;
      }

      .metric span {
        color: #475569;
        font-size: 13px;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .item {
        padding: 14px 16px;
        border-radius: 16px;
        background: #eff6ff;
        color: #1e3a8a;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <span>Mobile preview</span>
      <h1>Release Notes</h1>
      <p>Monitor product updates while continuing to work on the main page.</p>
    </div>
    <div class="section">
      <div class="metric-grid">
        <div class="metric">
          <strong>12</strong>
          <span>Open tasks</span>
        </div>
        <div class="metric">
          <strong>87%</strong>
          <span>QA complete</span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="list">
        <div class="item">Inline mobile check without leaving your current workflow.</div>
        <div class="item">Bookmarks stay synced through chrome storage.</div>
        <div class="item">Switch between mobile and desktop width depending on context.</div>
      </div>
    </div>
    <script src="/frame-tracker.js"></script>
  </body>
</html>
